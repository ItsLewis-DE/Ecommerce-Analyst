version: "3.8"

services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack:3.8.1  # Đổi từ bản -pro sang bản mặc định (Free)
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # Bỏ dòng LOCALSTACK_AUTH_TOKEN đi
      - DEBUG=${DEBUG:-0}
      - LAMBDA_LIMITS_CODE_SIZE_UNZIPPED=1048576000
      - MAIN_CONTAINER_NAME=${LOCALSTACK_DOCKER_NAME:-localstack-main}
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=120 
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"